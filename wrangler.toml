name = "pathwise"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Main entry point (set by opennextjs-cloudflare build)
main = ".open-next/worker.js"

# Assets directory
assets = { directory = ".open-next/assets", binding = "ASSETS" }

# Environment variables
[vars]
NEXT_PUBLIC_APP_URL = "https://pathwise.workers.dev"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "pathwise-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after running: wrangler d1 create pathwise-db

# R2 bucket for document storage (optional)
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "pathwise-uploads"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.staging]
vars = { ENVIRONMENT = "staging" }
